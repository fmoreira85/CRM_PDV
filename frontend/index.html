<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRM PDV - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="layout" id="app-layout">
      <aside
        id="sidebar"
        class="sidebar offcanvas-md offcanvas-start"
        tabindex="-1"
        aria-labelledby="sidebarLabel"
      >
        <div class="sidebar-header d-flex align-items-center justify-content-between">
          <div class="brand d-flex align-items-center gap-2">
            <span class="brand-mark">
              <i class="bi bi-grid-1x2-fill"></i>
            </span>
            <span class="brand-name" id="sidebarLabel">CRM PDV</span>
          </div>
          <button
            type="button"
            class="btn-close d-md-none"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section">Visao geral</div>
          <button class="nav-item is-active" data-nav="dashboard">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
          </button>

          <div class="nav-section">Operacoes</div>
          <button class="nav-item" data-nav="vendas">
            <i class="bi bi-bag-check"></i>
            <span>Vendas</span>
          </button>
          <button class="nav-item" data-nav="estoque">
            <i class="bi bi-box-seam"></i>
            <span>Estoque</span>
          </button>
          <button class="nav-item" data-nav="caixa">
            <i class="bi bi-cash-coin"></i>
            <span>Caixa</span>
          </button>

          <div class="nav-section">Cadastros</div>
          <button class="nav-item" data-nav="clientes">
            <i class="bi bi-people"></i>
            <span>Clientes</span>
          </button>
          <button class="nav-item" data-nav="produtos">
            <i class="bi bi-grid-3x3-gap"></i>
            <span>Produtos</span>
          </button>
          <button class="nav-item" data-nav="fornecedores">
            <i class="bi bi-truck"></i>
            <span>Fornecedores</span>
          </button>
          <button class="nav-item" data-nav="encomendas">
            <i class="bi bi-clipboard-check"></i>
            <span>Encomendas</span>
          </button>

          <div class="nav-section">Administracao</div>
          <button class="nav-item" data-nav="despesas">
            <i class="bi bi-receipt"></i>
            <span>Despesas</span>
          </button>
          <button class="nav-item" data-nav="usuarios">
            <i class="bi bi-shield-lock"></i>
            <span>Usuarios</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="user-card">
            <div class="user-avatar">
              <i class="bi bi-person"></i>
            </div>
            <div class="user-meta">
              <div class="user-name" id="user-name">Admin</div>
              <div class="user-role" id="user-role">Administrador</div>
            </div>
          </div>
          <button class="btn btn-outline-light btn-sm w-100 mt-3" id="logout-button">
            <i class="bi bi-box-arrow-right"></i>
            Sair
          </button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar" id="topbar">
          <div class="topbar-left">
            <button
              class="btn btn-outline-secondary d-md-none"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#sidebar"
              aria-controls="sidebar"
            >
              <i class="bi bi-list"></i>
            </button>
            <div class="topbar-title">
              <p class="eyebrow" id="page-subtitle">Painel administrativo</p>
              <h1 id="page-title">Dashboard</h1>
            </div>
          </div>
          <div class="topbar-actions">
            <div class="input-group topbar-search">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input
                type="text"
                class="form-control"
                placeholder="Buscar..."
                aria-label="Buscar"
              />
            </div>
            <button class="btn btn-light">
              <i class="bi bi-calendar3"></i>
            </button>
            <button class="btn btn-primary" id="topbar-primary-action">
              <i class="bi bi-plus-circle"></i>
              Nova venda
            </button>
          </div>
        </header>

        <section id="page-content" class="page-content"></section>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
